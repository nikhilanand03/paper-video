<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Image with Caption</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.frame {
    width: 1920px;
    height: 1080px;
    background: var(--bg-primary, #FAFAF8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 96px 128px;
}

.title {
    font-family: var(--font-heading, 'Inter'), sans-serif;
    font-size: 38px;
    font-weight: 600;
    color: var(--text-primary, #1A1A1A);
    text-align: center;
    margin-bottom: 40px;
    letter-spacing: -0.5px;
}

.image-container {
    position: relative;
    max-width: 1200px;
    max-height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.image-container img {
    width: 1200px;
    height: 600px;
    object-fit: contain;
    border-radius: 8px;
    display: block;
}

.placeholder {
    width: 1200px;
    height: 600px;
    background: #F0F0EC;
    border: 1px solid #E5E7EB;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body, 'Inter'), sans-serif;
    font-size: 24px;
    color: var(--text-secondary, #6B7280);
}

.caption {
    font-family: var(--font-body, 'Inter'), sans-serif;
    font-size: 20px;
    color: var(--text-secondary, #6B7280);
    text-align: center;
    margin-top: 24px;
    max-width: 1200px;
    line-height: 1.5;
}

.callout {
    position: absolute;
    transform: translate(-50%, -50%);
    background: var(--bg-surface, #FFFFFF);
    border: 1px solid #E5E7EB;
    border-radius: 8px;
    padding: 6px 14px;
    font-family: var(--font-body, 'Inter'), sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent-primary, #2563EB);
    white-space: nowrap;
    pointer-events: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    animation: pop-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both;
}
.title           { animation: fade-down 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both; }
.image-container { animation: scale-up-subtle 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both; }
.caption         { animation: fade-up 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both; }
</style>
</head>
<body>
<div class="frame">
    <div class="title" id="title"></div>
    <div class="image-container" id="image-container"></div>
    <div class="caption" id="caption"></div>
</div>

<script>
const data = window.SCENE_DATA || {
    title: "Architecture Overview",
    image_path: "",
    caption: "Figure 1: High-level system architecture showing the main components.",
    callouts: [
        { label: "API Gateway", x: 30, y: 25 },
        { label: "Database", x: 70, y: 60 }
    ]
};

// Title
const titleEl = document.getElementById('title');
if (data.title) {
    titleEl.textContent = data.title;
} else {
    titleEl.style.display = 'none';
}

// Image or placeholder
const container = document.getElementById('image-container');

if (data.image_path) {
    const img = document.createElement('img');
    img.src = data.image_path;
    img.alt = data.caption || data.title || 'Image';
    img.onerror = function() {
        showPlaceholder();
    };
    img.onload = function() {
        addCallouts(img.offsetWidth, img.offsetHeight);
    };
    container.appendChild(img);
} else {
    showPlaceholder();
}

function showPlaceholder() {
    container.innerHTML = '';
    const ph = document.createElement('div');
    ph.className = 'placeholder';
    ph.textContent = data.image_path ? 'Image not found: ' + data.image_path : 'No image provided';
    container.appendChild(ph);
    addCallouts(1200, 600);
}

function addCallouts(w, h) {
    if (!data.callouts || !data.callouts.length) return;
    data.callouts.forEach(function(c) {
        const el = document.createElement('div');
        el.className = 'callout';
        el.textContent = c.label;
        el.style.left = (c.x / 100 * w) + 'px';
        el.style.top = (c.y / 100 * h) + 'px';
        container.appendChild(el);
    });
}

// Caption
const captionEl = document.getElementById('caption');
if (data.caption) {
    captionEl.textContent = data.caption;
} else {
    captionEl.style.display = 'none';
}
</script>
</body>
</html>
