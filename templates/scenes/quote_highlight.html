<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Quote Highlight</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.frame {
    width: 1920px;
    height: 1080px;
    background: var(--bg-primary, #FAFAF8);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}

.quote-area {
    position: relative;
    max-width: 1100px;
    text-align: center;
}

.decorative-mark {
    position: absolute;
    left: 350px;
    top: 200px;
    font-family: var(--font-title, 'Instrument Serif'), serif;
    font-size: 200px;
    line-height: 1;
    color: var(--text-primary, #1A1A1A);
    opacity: 0.06;
    user-select: none;
    pointer-events: none;
}

.quote-text {
    font-family: var(--font-body, 'Inter'), sans-serif;
    font-size: 32px;
    line-height: 1.65;
    color: var(--text-primary, #1A1A1A);
    max-width: 1000px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
}

.quote-text .highlight {
    color: #2563EB;
    background: rgba(37, 99, 235, 0.08);
    border-radius: 4px;
    padding: 2px 6px;
}

.attribution {
    font-family: var(--font-body, 'Inter'), sans-serif;
    font-size: 16px;
    color: var(--text-secondary, #6B7280);
    text-align: center;
    margin-top: 32px;
    position: relative;
    z-index: 1;
}
.decorative-mark { animation: scale-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both; }
.quote-text      { animation: fade-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both; }
.quote-text .highlight { animation: pop-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both; }
.attribution     { animation: fade-in 0.5s ease 0.5s both; }
</style>
</head>
<body>
<div class="frame">
    <div class="decorative-mark">&ldquo;</div>
    <div class="quote-area">
        <div class="quote-text" id="quote-text"></div>
        <div class="attribution" id="attribution"></div>
    </div>
</div>

<script>
const data = window.SCENE_DATA || {
    quote: "The best way to predict the future is to invent it.",
    highlight_phrase: "predict the future",
    attribution: "Alan Kay"
};

function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

const quoteEl = document.getElementById('quote-text');
const attrEl = document.getElementById('attribution');

let quoteHTML = escapeHTML(data.quote || '');

if (data.highlight_phrase) {
    const escaped = escapeHTML(data.highlight_phrase);
    const idx = quoteHTML.indexOf(escaped);
    if (idx !== -1) {
        quoteHTML =
            quoteHTML.slice(0, idx) +
            '<span class="highlight">' + escaped + '</span>' +
            quoteHTML.slice(idx + escaped.length);
    }
}

quoteEl.innerHTML = quoteHTML;

if (data.attribution) {
    attrEl.textContent = '\u2014 ' + data.attribution;
}
</script>
</body>
</html>
