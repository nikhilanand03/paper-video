<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Section Header</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.frame {
    width: 1920px;
    height: 1080px;
    background: var(--bg-primary, #FAFAF8);
    display: flex;
    align-items: center;
    justify-content: flex-start;
    position: relative;
    overflow: hidden;
}

.content {
    padding-left: 140px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
}

/* Decorative section number - top right */
.deco-number {
    position: absolute;
    top: 96px;
    right: 128px;
    font-family: var(--font-mono, 'IBM Plex Mono'), monospace;
    font-size: 120px;
    font-weight: 500;
    color: var(--accent-primary, #2563EB);
    opacity: 0.1;
    line-height: 1;
    user-select: none;
    pointer-events: none;
}

/* Left accent bar — positioned via the content wrapper */
.accent-bar {
    position: absolute;
    left: 96px;
    top: 0;
    bottom: 0;
    width: 6px;
    border-radius: 3px;
    background: linear-gradient(
        180deg,
        var(--accent-primary, #2563EB),
        var(--accent-secondary, #7C3AED)
    );
}

.section-label {
    font-family: var(--font-body, 'Inter'), sans-serif;
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--accent-primary, #2563EB);
    padding-bottom: 20px;
}

.heading {
    font-family: var(--font-title, 'Instrument Serif'), serif;
    font-size: 60px;
    font-weight: 400;
    letter-spacing: -1px;
    line-height: 1.2;
    color: var(--text-primary, #1A1A1A);
}

.tagline {
    font-family: var(--font-body, 'Inter'), sans-serif;
    font-size: 24px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--text-secondary, #6B7280);
    max-width: 900px;
    padding-top: 24px;
}
.accent-bar    { transform-origin: top; animation: grow-height 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both; }
.deco-number   { animation: scale-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both; }
.section-label { animation: slide-in-left 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both; }
.heading       { animation: slide-in-left 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both; }
.tagline       { animation: fade-up 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.45s both; }
</style>
</head>
<body>
<div class="frame">
    <div class="deco-number" id="deco-number"></div>
    <div class="content">
        <div class="accent-bar"></div>
        <div class="section-label" id="section-label"></div>
        <h1 class="heading" id="heading"></h1>
        <p class="tagline" id="tagline"></p>
    </div>
</div>

<script>
const data = window.SCENE_DATA || {
    section_number: 1,
    heading: "Introduction",
    tagline: "Setting the stage for what follows"
};

const num = data.section_number != null ? data.section_number : '';

document.getElementById('deco-number').textContent = String(num).padStart(2, '0');
document.getElementById('section-label').textContent = 'Part ' + num;
document.getElementById('heading').textContent = data.heading || '';

const taglineEl = document.getElementById('tagline');
if (data.tagline) {
    taglineEl.textContent = data.tagline;
} else {
    taglineEl.style.display = 'none';
}
</script>
</body>
</html>
