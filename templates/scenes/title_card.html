<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Title Card</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FAFAF8;
    --bg-surface: #FFFFFF;
    --text-primary: #1A1A1A;
    --text-secondary: #6B7280;
    --text-dim: #9CA3AF;
    --accent-primary: #2563EB;
    --accent-secondary: #7C3AED;
    --font-title: 'Instrument Serif', serif;
    --font-heading: 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: var(--bg-primary);
  }

  .frame {
    width: 1920px;
    height: 1080px;
    background: var(--bg-primary);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  .content {
    padding: 96px 128px;
    width: 100%;
    display: flex;
    flex-direction: column;
  }

  .venue-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1.5px solid var(--accent-primary);
    border-radius: 999px;
    padding: 6px 20px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent-primary);
    background: rgba(37, 99, 235, 0.04);
    width: fit-content;
  }

  .title {
    font-family: var(--font-title);
    font-size: 60px;
    font-weight: 400;
    letter-spacing: -1px;
    line-height: 1.15;
    color: var(--text-primary);
    max-width: 1400px;
    padding-top: 40px;
    margin-bottom: 0;
  }

  .authors {
    font-family: var(--font-body);
    font-size: 24px;
    font-weight: 400;
    color: var(--text-secondary);
    padding-top: 36px;
    margin-bottom: 0;
    max-width: 1200px;
    line-height: 1.5;
  }

  .authors .affiliation {
    font-size: 16px;
    color: var(--text-dim);
    margin-left: 4px;
  }

  .subtitle {
    font-family: var(--font-body);
    font-size: 20px;
    color: var(--text-dim);
    line-height: 1.5;
    padding-top: 20px;
    letter-spacing: 0.2px;
    margin-bottom: 0;
  }

  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, #2563EB 0%, #7C3AED 50%, transparent 100%);
    transform-origin: left;
    animation: grow-width 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
  }
  .venue-badge { animation: fade-down 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both; }
  .title       { animation: fade-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both; }
  .authors     { animation: fade-up 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both; }
  .subtitle    { animation: fade-up 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.45s both; }
</style>
</head>
<body>
<div class="frame" id="scene">
  <div class="content">
    <div class="venue-badge" id="venue-badge"></div>
    <h1 class="title" id="title"></h1>
    <div class="authors" id="authors"></div>
    <div class="subtitle" id="subtitle"></div>
  </div>
  <div class="bottom-line"></div>
</div>

<script>
(function() {
  var data = window.SCENE_DATA || {
    title: 'Attention Is All You Need',
    authors: [
      { name: 'Ashish Vaswani', affiliation: 'Google Brain' },
      { name: 'Noam Shazeer', affiliation: 'Google Brain' }
    ],
    subtitle: 'Neural Information Processing Systems',
    venue: 'NeurIPS 2017',
    year: '2017'
  };

  // Venue badge
  var badgeEl = document.getElementById('venue-badge');
  var venueText = [];
  if (data.venue) venueText.push(data.venue);
  if (data.year && (!data.venue || data.venue.indexOf(data.year) === -1)) venueText.push(data.year);
  badgeEl.textContent = venueText.join(' ');
  if (!venueText.length) badgeEl.style.display = 'none';

  // Title
  document.getElementById('title').textContent = data.title || '';

  // Authors — support string or array of {name, affiliation}
  var authorsEl = document.getElementById('authors');
  if (typeof data.authors === 'string') {
    authorsEl.textContent = data.authors;
  } else if (Array.isArray(data.authors)) {
    data.authors.forEach(function(author, i) {
      if (i > 0) {
        authorsEl.appendChild(document.createTextNode(', '));
      }
      if (typeof author === 'string') {
        authorsEl.appendChild(document.createTextNode(author));
      } else {
        var nameSpan = document.createElement('span');
        nameSpan.textContent = author.name;
        authorsEl.appendChild(nameSpan);
        if (author.affiliation) {
          var affSpan = document.createElement('span');
          affSpan.className = 'affiliation';
          affSpan.textContent = ' (' + author.affiliation + ')';
          authorsEl.appendChild(affSpan);
        }
      }
    });
  }

  // Subtitle
  var subtitleEl = document.getElementById('subtitle');
  subtitleEl.textContent = data.subtitle || '';
  if (!data.subtitle) subtitleEl.style.display = 'none';

})();
</script>
</body>
</html>
